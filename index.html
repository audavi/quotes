<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotify</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">❝</span>
        <span class="logo-text">Quotify</span>
      </div>
      <button class="theme-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle light/dark theme">
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
    </header>

    <main class="main">
      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search quotes or authors…" autocomplete="off" spellcheck="false" />
        <button class="search-clear" id="btn-search-clear" aria-label="Clear search" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <!-- Category Filter -->
      <div class="categories" id="categories">
        <button class="category-btn active" data-category="all">All</button>
        <button class="category-btn" data-category="inspiration">Inspiration</button>
        <button class="category-btn" data-category="wisdom">Wisdom</button>
        <button class="category-btn" data-category="humor">Humor</button>
        <button class="category-btn" data-category="life">Life</button>
        <button class="category-btn" data-category="success">Success</button>
        <button class="category-btn fav-cat-btn" data-category="favorites">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          Favorites
          <span class="fav-count-badge" id="fav-count-badge" style="display:none">0</span>
        </button>
      </div>

      <!-- Quote Card -->
      <div class="card" id="quote-card">
        <div class="quote-mark-top">&#8220;</div>
        <button class="fav-heart-btn" id="btn-favorite" aria-label="Save to favorites">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
        <div class="quote-content">
          <p class="quote-text" id="quote-text">
            The only way to do great work is to love what you do.
          </p>
          <div class="quote-author">
            <div class="author-line"></div>
            <span id="quote-author">Steve Jobs</span>
          </div>
          <span class="quote-category-badge" id="quote-category">inspiration</span>
        </div>
        <div class="quote-mark-bottom">&#8221;</div>
      </div>

      <!-- Empty States -->
      <div class="empty-state" id="no-results" style="display:none">
        <span class="empty-icon">🔍</span>
        <p>No quotes match your search.</p>
      </div>
      <div class="empty-state" id="no-favorites" style="display:none">
        <span class="empty-icon">🩷</span>
        <p>No favorites yet — tap ♥ on any quote to save it here.</p>
      </div>

      <!-- History Navigation + Counter -->
      <div class="history-nav">
        <button class="nav-btn" id="btn-back" title="Go back" aria-label="Previous quote" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <p class="counter" id="counter"></p>
        <button class="nav-btn" id="btn-forward" title="Go forward" aria-label="Next quote in history" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button class="action-btn secondary" id="btn-copy" title="Copy to clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span id="copy-label">Copy</span>
        </button>
        <button class="action-btn secondary" id="btn-twitter" title="Share on X / Twitter">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span>Tweet</span>
        </button>
        <button class="action-btn primary" id="btn-new">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
          New Quote
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Made with <span class="heart">♥</span> · <span id="total-count"></span> quotes in collection</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
